global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "flask-app"
    scrape_interval: 10s
    static_configs:
      - targets:
          - "app1:5000"
          - "app2:5000"
          - "app3:5000"
          - "app4:5000"
          - "app5:5000"
    metrics_path: /metrics
