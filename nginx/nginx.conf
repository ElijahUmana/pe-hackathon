worker_processes 2;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    upstream flask_app {
        least_conn;
        server app1:5000;
        server app2:5000;
        server app3:5000;
        keepalive 32;
        keepalive_timeout 60s;
        keepalive_requests 1000;
    }

    access_log off;
    error_log /var/log/nginx/error.log error;

    proxy_connect_timeout 5s;
    proxy_send_timeout 15s;
    proxy_read_timeout 15s;

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;

    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;
    gzip_vary on;
    gzip_comp_level 1;

    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=health_cache:1m max_size=10m inactive=60s;
    proxy_cache_path /tmp/nginx_micro levels=1:2 keys_zone=micro_cache:10m max_size=50m inactive=10s;

    map $request_method $skip_cache {
        GET     0;
        default 1;
    }

    server {
        listen 80;
        server_name _;

        location /nginx-health {
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        location /nginx-status {
            stub_status;
        }

        location /health {
            proxy_pass http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_cache health_cache;
            proxy_cache_valid 200 5s;
        }

        location ~ ^/(urls|users|events)$ {
            proxy_pass http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache micro_cache;
            proxy_cache_valid 200 1s;
            proxy_cache_key "$request_method$request_uri$args";
            proxy_cache_use_stale error timeout updating;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 1s;
            proxy_no_cache $skip_cache;
            proxy_cache_bypass $skip_cache;

            add_header X-Cache-Status $upstream_cache_status;
            proxy_pass_header X-Cache;
        }

        location / {
            proxy_pass http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass_header X-Cache;
        }
    }
}
