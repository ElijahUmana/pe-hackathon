worker_processes 2;

events {
    worker_connections 4096;
}

http {
    upstream flask_app {
        least_conn;
        server app1:5000;
        server app2:5000;
        server app3:5000;
        server app4:5000;
        server app5:5000;
        keepalive 32;
    }

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Buffers
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;
    gzip_vary on;

    # Proxy cache for health endpoint
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=health_cache:1m max_size=10m inactive=60s;

    server {
        listen 80;
        server_name _;

        # Health check for Nginx itself
        location /nginx-health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # Prometheus metrics from Nginx (stub_status)
        location /nginx-status {
            stub_status;
            access_log off;
        }

        # Cached health endpoint
        location /health {
            proxy_pass http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_cache health_cache;
            proxy_cache_valid 200 5s;
            access_log off;
        }

        location / {
            proxy_pass http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass through cache headers from Flask
            proxy_pass_header X-Cache;
        }
    }
}
