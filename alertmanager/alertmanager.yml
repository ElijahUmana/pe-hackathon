global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 5m
  receiver: "webhook"

  routes:
    - match:
        severity: critical
      receiver: "webhook"
      group_wait: 5s
      repeat_interval: 2m

    - match:
        severity: warning
      receiver: "webhook"
      group_wait: 15s
      repeat_interval: 5m

receivers:
  - name: "webhook"
    webhook_configs:
      - url: "http://webhook-receiver:9094/alert"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "instance"]
