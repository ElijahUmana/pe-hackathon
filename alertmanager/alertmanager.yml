global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: "discord"

  routes:
    - match:
        severity: critical
      receiver: "discord"
      group_wait: 10s
      repeat_interval: 15m

receivers:
  - name: "discord"
    webhook_configs:
      - url: "http://localhost:9094/alert"
        send_resolved: true

# NOTE: Replace the webhook URL above with your actual Discord webhook URL.
# Format: https://discord.com/api/webhooks/{webhook_id}/{webhook_token}
# To set up:
# 1. Go to your Discord server > Server Settings > Integrations > Webhooks
# 2. Create a new webhook and copy the URL
# 3. Replace the url above with your webhook URL
#
# For email alerts, add an email receiver:
# receivers:
#   - name: "email"
#     email_configs:
#       - to: "your-email@example.com"
#         from: "alertmanager@example.com"
#         smarthost: "smtp.gmail.com:587"
#         auth_username: "your-email@gmail.com"
#         auth_password: "app-password"
